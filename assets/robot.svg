<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Body / Head -->
  <rect x="50" y="60" width="100" height="90" rx="45" fill="white"/>
  <!-- Face Screen -->
  <rect x="65" y="85" width="70" height="50" rx="25" fill="#111111"/>
  <!-- Eyes -->
  <ellipse cx="88" cy="105" rx="10" ry="12" fill="#3b82f6"/>
  <ellipse cx="112" cy="105" rx="10" ry="12" fill="#3b82f6"/>
  <!-- Eye shine -->
  <circle cx="85" cy="100" r="3" fill="white" opacity="0.8"/>
  <circle cx="109" cy="100" r="3" fill="white" opacity="0.8"/>
  <!-- Mouth -->
  <rect x="90" y="125" width="20" height="3" rx="1.5" fill="#333"/>
  <!-- Antenna -->
  <line x1="100" y1="60" x2="100" y2="35" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <circle cx="100" cy="30" r="8" fill="white"/>
  <circle cx="100" cy="30" r="4" fill="#ff6eb4"/>
  <!-- Arms -->
  <rect x="30" y="95" width="15" height="35" rx="7.5" fill="white"/>
  <rect x="155" y="95" width="15" height="35" rx="7.5" fill="white"/>
  <!-- Legs -->
  <rect x="75" y="145" width="18" height="30" rx="9" fill="white"/>
  <rect x="107" y="145" width="18" height="30" rx="9" fill="white"/>
  <!-- Feet -->
  <ellipse cx="84" cy="178" rx="14" ry="8" fill="white"/>
  <ellipse cx="116" cy="178" rx="14" ry="8" fill="white"/>
</svg>